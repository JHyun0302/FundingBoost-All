services:
  fundingboost-server:
    container_name: fundingboost-server
    image: fundingboost-server:${SERVER_IMAGE_TAG:-latest}
    build:
      context: ./FundingBoost-Server
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      FUNDINGBOOST_DB_URL: ${FUNDINGBOOST_DB_URL:-jdbc:mysql://mysql:3306/fundingboost?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
      FUNDINGBOOST_DB_USERNAME: ${FUNDINGBOOST_DB_USERNAME:-mysql}
      FUNDINGBOOST_DB_PASSWORD: ${FUNDINGBOOST_DB_PASSWORD:-1q2w3e4r!}
      PAYMENT_DB_NAME: ${PAYMENT_DB_NAME:-payment}
      REDIS_REFRESH_HOST: redis-refresh
      REDIS_REFRESH_PORT: 6379
      REDIS_LOCK_HOST: redis-lock
      REDIS_LOCK_PORT: 6379
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_KAFKA_ENABLED: ${APP_KAFKA_ENABLED:-true}
      APP_CATALOG_READER: ${APP_CATALOG_READER:-local}
      APP_CATALOG_REMOTE_BASE_URL: ${APP_CATALOG_REMOTE_BASE_URL:-http://funding-crawler:8090}
      APP_CATALOG_REMOTE_FALLBACK_TO_LOCAL: ${APP_CATALOG_REMOTE_FALLBACK_TO_LOCAL:-true}
      APP_PAYMENT_FOLLOW_UP_MODE: ${APP_PAYMENT_FOLLOW_UP_MODE:-direct}
      APP_PAYMENT_FOLLOW_UP_CONSUMERS_ENABLED: ${APP_PAYMENT_FOLLOW_UP_CONSUMERS_ENABLED:-false}
      APP_PAYMENT_FOLLOW_UP_GROUP_ID: ${APP_PAYMENT_FOLLOW_UP_GROUP_ID:-fundingboost-payment-follow-up}
      APP_PAYMENT_TOPICS_COMPLETED: ${APP_PAYMENT_TOPICS_COMPLETED:-fundingboost.payment.completed.v1}
      APP_PAYMENT_TOPICS_FAILED: ${APP_PAYMENT_TOPICS_FAILED:-fundingboost.payment.failed.v1}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-dummy-client-id}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-dummy-client-secret}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-http://138.2.43.7/login/oauth2/code/kakao}
      APP_PAY_BARCODE_VERIFY_BASE_URL: ${APP_PAY_BARCODE_VERIFY_BASE_URL:-}
      FUNDINGBOOST_CORS_ORIGINS: ${FUNDINGBOOST_CORS_ORIGINS:-http://138.2.43.7}
      TESTDATA_BOOTSTRAP_ENABLED: ${TESTDATA_BOOTSTRAP_ENABLED:-true}
      TESTDATA_BOOTSTRAP_RETRY_DELAY_MS: ${TESTDATA_BOOTSTRAP_RETRY_DELAY_MS:-10000}
    depends_on:
      mysql:
        condition: service_healthy
      mysql-bootstrap:
        condition: service_completed_successfully
      redis-refresh:
        condition: service_started
      redis-lock:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "${BACK_API_PORT:-8080}:8080"
    restart: unless-stopped
    networks:
      - back-net

  funding-crawler:
    container_name: funding-crawler
    image: fundingboost-crawler:${CRAWLER_IMAGE_TAG:-latest}
    build:
      context: ./FundingBoost-DataCrawler
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Seoul
      CRAWLER_DB_URL: ${CRAWLER_DB_URL:-jdbc:mysql://mysql:3306/item?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
      CRAWLER_DB_USERNAME: ${CRAWLER_DB_USERNAME:-mysql}
      CRAWLER_DB_PASSWORD: ${CRAWLER_DB_PASSWORD:-1q2w3e4r!}
      CRAWLER_BOOTSTRAP_ENABLED: ${CRAWLER_BOOTSTRAP_ENABLED:-false}
      CRAWLER_BOOTSTRAP_ITEM_LIMIT: ${CRAWLER_BOOTSTRAP_ITEM_LIMIT:-20}
      CRAWLER_INIT_API_ENABLED: ${CRAWLER_INIT_API_ENABLED:-false}
    depends_on:
      mysql:
        condition: service_healthy
      mysql-bootstrap:
        condition: service_completed_successfully
      fundingboost-server:
        condition: service_started
    ports:
      - "${BACK_CRAWLER_PORT:-8090}:8090"
    restart: unless-stopped
    networks:
      - back-net

  fundingboost-payment:
    container_name: fundingboost-payment
    image: fundingboost-payment:${PAYMENT_IMAGE_TAG:-latest}
    build:
      context: ./FundingBoost-Payment
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Seoul
      PAYMENT_DB_URL: ${PAYMENT_DB_URL:-jdbc:mysql://mysql:3306/payment?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
      PAYMENT_DB_USERNAME: ${PAYMENT_DB_USERNAME:-mysql}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD:-1q2w3e4r!}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      APP_PAYMENT_PROXY_BASE_URL: ${APP_PAYMENT_PROXY_BASE_URL:-http://fundingboost-server:8080}
      APP_PAYMENT_PROXY_CONNECT_TIMEOUT_MS: ${APP_PAYMENT_PROXY_CONNECT_TIMEOUT_MS:-3000}
      APP_PAYMENT_PROXY_READ_TIMEOUT_MS: ${APP_PAYMENT_PROXY_READ_TIMEOUT_MS:-10000}
      APP_PAYMENT_CONSUMERS_ENABLED: ${APP_PAYMENT_CONSUMERS_ENABLED:-false}
      APP_PAYMENT_CONSUMERS_GROUP_ID: ${APP_PAYMENT_CONSUMERS_GROUP_ID:-fundingboost-payment-skeleton}
      APP_PAYMENT_TOPICS_COMPLETED: ${APP_PAYMENT_TOPICS_COMPLETED:-fundingboost.payment.completed.v1}
      APP_PAYMENT_TOPICS_FAILED: ${APP_PAYMENT_TOPICS_FAILED:-fundingboost.payment.failed.v1}
    depends_on:
      mysql:
        condition: service_healthy
      mysql-bootstrap:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    ports:
      - "${PAYMENT_API_PORT:-8081}:8081"
    restart: unless-stopped
    networks:
      - back-net

  mysql:
    container_name: fundingboost-mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1q2w3e4r!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fundingboost}
      MYSQL_USER: ${MYSQL_USER:-mysql}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-1q2w3e4r!}
      CRAWLER_DB_NAME: ${CRAWLER_DB_NAME:-item}
      PAYMENT_DB_NAME: ${PAYMENT_DB_NAME:-payment}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/oci/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - back-net

  mysql-bootstrap:
    container_name: fundingboost-mysql-bootstrap
    image: mysql:8.0
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1q2w3e4r!}
      MYSQL_USER: ${MYSQL_USER:-mysql}
      CRAWLER_DB_NAME: ${CRAWLER_DB_NAME:-item}
      PAYMENT_DB_NAME: ${PAYMENT_DB_NAME:-payment}
    command:
      - sh
      - -c
      - >
        mysql -hmysql -uroot -p"$${MYSQL_ROOT_PASSWORD}" -e "
        CREATE DATABASE IF NOT EXISTS \`$${CRAWLER_DB_NAME}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
        GRANT ALL PRIVILEGES ON \`$${CRAWLER_DB_NAME}\`.* TO '$${MYSQL_USER}'@'%';
        CREATE DATABASE IF NOT EXISTS \`$${PAYMENT_DB_NAME}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
        GRANT ALL PRIVILEGES ON \`$${PAYMENT_DB_NAME}\`.* TO '$${MYSQL_USER}'@'%';
        FLUSH PRIVILEGES;"
    restart: "no"
    networks:
      - back-net

  redis-refresh:
    container_name: fundingboost-redis-refresh
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-refresh-data:/data
    restart: unless-stopped
    networks:
      - back-net

  redis-lock:
    container_name: fundingboost-redis-lock
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-lock-data:/data
    restart: unless-stopped
    networks:
      - back-net

  elasticsearch:
    container_name: fundingboost-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      xpack.license.self_generated.type: basic
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      TZ: Asia/Seoul
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - back-net

  kafka:
    container_name: fundingboost-kafka
    image: apache/kafka:3.7.2
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx512m -Xms256m}
      TZ: Asia/Seoul
    restart: unless-stopped
    networks:
      - back-net

networks:
  back-net:
    driver: bridge

volumes:
  mysql-data:
  redis-refresh-data:
  redis-lock-data:
  elasticsearch-data:

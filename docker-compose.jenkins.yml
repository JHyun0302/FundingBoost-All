services:
  jenkins:
    build:
      context: .
      dockerfile: deploy/jenkins/Dockerfile
    container_name: fundingboost-jenkins
    ports:
      - "${JENKINS_HTTP_PORT:-8081}:8080"
      - "${JENKINS_AGENT_PORT:-50001}:50000"
    environment:
      JENKINS_OPTS: "--httpPort=8080"
      JAVA_OPTS: "-Duser.timezone=Asia/Seoul"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./:/workspace/fundingboost
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_home:

services:
  fundingboost-edge:
    container_name: fundingboost-edge
    image: nginx:1.27-alpine
    environment:
      FRONT_PRIVATE_HOST: ${FRONT_PRIVATE_HOST:-10.0.1.198}
      FRONT_PRIVATE_PORT: ${FRONT_PRIVATE_PORT:-80}
      FRONT_OFFLOAD_ORIGIN: ${FRONT_OFFLOAD_ORIGIN:-}
      BACK_PRIVATE_HOST: ${BACK_PRIVATE_HOST:-10.0.1.62}
      BACK_PRIVATE_PORT: ${BACK_PRIVATE_PORT:-8080}
      CATALOG_PRIVATE_HOST: ${CATALOG_PRIVATE_HOST:-10.0.1.62}
      CATALOG_PRIVATE_PORT: ${CATALOG_PRIVATE_PORT:-8090}
      CATALOG_ROUTE_MODE: ${CATALOG_ROUTE_MODE:-off}
      CATALOG_CANARY_PERCENT: ${CATALOG_CANARY_PERCENT:-5}
      PAYMENT_PRIVATE_HOST: ${PAYMENT_PRIVATE_HOST:-10.0.1.62}
      PAYMENT_PRIVATE_PORT: ${PAYMENT_PRIVATE_PORT:-8081}
      PAYMENT_ROUTE_MODE: ${PAYMENT_ROUTE_MODE:-off}
      PAYMENT_CANARY_PERCENT: ${PAYMENT_CANARY_PERCENT:-5}
      EDGE_ALLOWED_HOST_REGEX: ${EDGE_ALLOWED_HOST_REGEX:-138[.]2[.]43[.]7|localhost|127[.]0[.]0[.]1}
      EDGE_ENTRY_PATH: ${EDGE_ENTRY_PATH:-change-this-random-path}
      EDGE_ACCESS_COOKIE_MAX_AGE: ${EDGE_ACCESS_COOKIE_MAX_AGE:-2592000}
      EDGE_RATE_LIMIT_PER_IP: ${EDGE_RATE_LIMIT_PER_IP:-20r/s}
      EDGE_RATE_LIMIT_BURST: ${EDGE_RATE_LIMIT_BURST:-100}
      EDGE_CONN_LIMIT: ${EDGE_CONN_LIMIT:-30}
    volumes:
      - ./deploy/oci/edge/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./deploy/oci/edge/includes:/etc/nginx/includes:ro
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
    restart: unless-stopped
